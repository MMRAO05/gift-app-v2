<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>🎂 Happy Birthday!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Great+Vibes&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #1a1410;
            color: #fff;
            overflow: hidden;
        }

        /* ===== BACKGROUND PARTICLES ===== */
        .bg-particles {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #c9a86c;
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(-10vh) rotate(720deg); }
        }

        /* ===== CURSOR GLOW ===== */
        .cursor-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,108,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 24px;
            text-align: center;
        }

        /* ===== BIRTHDAY CARD ===== */
        .card {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 36px 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeUp 0.8s ease;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card .emoji {
            font-size: 72px;
            display: block;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .card h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 44px;
            color: #c9a86c;
            margin: 8px 0 6px;
        }
        .card .sub {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-style: italic;
            color: rgba(255,255,255,0.5);
            margin-bottom: 20px;
        }
        .card .message {
            font-size: 16px;
            line-height: 1.7;
            color: rgba(255,255,255,0.75);
            margin-bottom: 12px;
            padding: 0 8px;
        }
        .card .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            color: #c9a86c;
            margin-bottom: 28px;
        }

        .card .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #c9a86c, transparent);
            margin: 16px auto 24px;
        }

        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .btn {
            display: inline-block;
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 0.02em;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c9a86c, #a8894a);
            color: #1a1410;
            box-shadow: 0 8px 30px rgba(201,168,108,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(201,168,108,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        /* ===== CONFETTI ===== */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-10vh) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) scale(0.5); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card { padding: 32px 20px 28px; }
            .card h1 { font-size: 34px; }
            .card .emoji { font-size: 56px; }
            .btn { font-size: 14px; padding: 12px 20px; }
        }
    </style>
</head>
<body>

    <!-- CURSOR GLOW -->
    <div class="cursor-glow" id="cursorGlow"></div>

    <!-- BACKGROUND PARTICLES -->
    <div class="bg-particles" id="bgParticles"></div>

    <!-- CONFETTI CONTAINER -->
    <div class="confetti-container" id="confettiContainer"></div>

    <!-- MAIN -->
    <div class="container">
        <div class="card">
            <span class="emoji">🎂</span>
            <h1>Happy Birthday!</h1>
            <p class="sub">— A special day for a special soul —</p>
            <div class="divider"></div>
            <p class="message">
                Wishing you a day filled with love, joy, and everything that makes you smile.
                May this year bring you countless beautiful moments and endless happiness.
            </p>
            <p class="signature">— with love, always</p>
            <div class="divider"></div>
            <div class="btn-group">
                <a href="index.html" class="btn btn-primary">🎁 Back to Gift</a>
                <a href="index.html" class="btn btn-secondary">✨ Open Your Surprise</a>
            </div>
        </div>
    </div>

    <script>
        // ===== CURSOR GLOW =====
        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        // ===== BACKGROUND PARTICLES =====
        (function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 3 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
                particle.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(particle);
            }
        })();

        // ===== CONFETTI =====
        function launchConfetti(count = 100) {
            const container = document.getElementById('confettiContainer');
            const colors = ['#c9a86c', '#c0395e', '#e8b4c4', '#f1c40f', '#2ecc71', '#3498db', '#e67e22'];
            for (let i = 0; i < count; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.width = (Math.random() * 8 + 4) + 'px';
                piece.style.height = (Math.random() * 8 + 4) + 'px';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                piece.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                piece.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(piece);
                setTimeout(() => piece.remove(), 4000);
            }
        }

        // Launch confetti on load
        window.addEventListener('load', () => {
            setTimeout(() => launchConfetti(120), 500);
            setTimeout(() => launchConfetti(80), 1500);
        });
    </script>
</body>
</html>
